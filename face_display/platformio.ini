[env:esp32-s3-supermini]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; ── Library ──────────────────────────────────────────────────────────────────
lib_deps = bodmer/TFT_eSPI @ ^2.5.43

; ── TFT_eSPI pin config (avoids editing library User_Setup.h) ────────────────
build_flags =
  -DUSER_SETUP_LOADED=1
  -DST7789_DRIVER=1
  -DTFT_WIDTH=240
  -DTFT_HEIGHT=320
  -DTFT_MOSI=11
  -DTFT_SCLK=12
  -DTFT_CS=10
  -DTFT_DC=2
  -DTFT_RST=3
  -DTFT_BL=-1
  -DLOAD_GLCD=1
  -DSPI_FREQUENCY=40000000
  -DARDUINO_USB_CDC_ON_BOOT=1   ; enables Serial over native USB on S3

; ── Upload / monitor ─────────────────────────────────────────────────────────
; Adjust upload_port to match your system (run: ls /dev/ttyUSB* or /dev/ttyACM*)
upload_port    = /dev/ttyUSB0
monitor_port   = /dev/ttyUSB0
monitor_speed  = 115200
monitor_filters = direct
